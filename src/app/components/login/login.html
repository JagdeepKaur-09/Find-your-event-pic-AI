<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card shadow p-4">
        <h3 class="text-center mb-4">Welcome Back</h3>
        
        <form (ngSubmit)="onLogin()">
          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Email address</label>
            <input type="email" class="form-control" id="email" name="email" [(ngModel)]="userEmail" placeholder="name@example.com">
          </div>
          
          <div class="mb-4">
            <label for="password" class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" id="password" name="password" [(ngModel)]="userPassword" placeholder="Enter your password">
          </div>
          
          <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
        </form>

        <div class="text-center mt-3">
          <small>Don't have an account? <a routerLink="/signup" class="text-decoration-none">Sign up here</a></small>
        </div>
      </div>

    </div>
  </div>
</div>
