<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-xl-4">
      <div class="card border-0 shadow-sm auth-card">
        <div class="card-body p-4 p-md-5">
          <p class="text-uppercase small text-secondary mb-2">Welcome back</p>
          <h1 class="h3 mb-3">Log in to CatchYoFace</h1>
          <p class="text-secondary mb-4">Pick up where you left off, manage rooms, or find your event photos.</p>

          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

          <form (ngSubmit)="onLogin()">
            <div class="mb-3">
              <label class="form-label fw-semibold" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" [(ngModel)]="userEmail">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold" for="password">Password</label>
              <input class="form-control" id="password" name="password" type="password" [(ngModel)]="userPassword">
            </div>

            <button class="btn btn-dark w-100" type="submit" [disabled]="loading">
              {{ loading ? 'Logging in...' : 'Log in' }}
            </button>
          </form>

          <p class="mt-4 mb-0 text-secondary text-center">
            New to CatchYoFace?
            <a routerLink="/signup" class="text-decoration-none">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
