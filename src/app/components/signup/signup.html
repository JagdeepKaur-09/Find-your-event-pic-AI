<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card shadow p-4">
        <h3 class="text-center mb-4">Create an Account</h3>
        
        <form (ngSubmit)="onSignup()">
          <div class="mb-3">
            <label for="name" class="form-label fw-bold">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" [(ngModel)]="userName" placeholder="John Doe">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Email address</label>
            <input type="email" class="form-control" id="email" name="email" [(ngModel)]="userEmail" placeholder="name@example.com">
          </div>
          
          <div class="mb-4">
            <label for="password" class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" id="password" name = "password" [(ngModel)] = "userPassword" placeholder="Create a password">
          </div>

          <input type="file" (change)="onUploadReferenceFace($event)">

          <button type="submit" class="btn btn-primary w-100 fw-bold">Sign Up</button>
        </form>

        <div class="text-center mt-3">
          <small>Already have an account? <a routerLink="/login" class="text-decoration-none">Login here</a></small>
        </div>
      </div>

    </div>
  </div>
</div>
